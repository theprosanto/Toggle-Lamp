<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lamp Toggle</title>
    <link rel="stylesheet" href="src/output.css">
</head>

<body class="flex items-center justify-center">
    <div class="text-center">
        <img class="mb-5" id="lamp" src="images/light-off.png">

        <button 
            class="bg-amber-300 font-bold px-6 py-2 rounded shadow text-lg"
            id="btn" 
            onclick="toggleLamp()">
            Turn ON
        </button>
    </div>

    <script src="js/script.js"></script>

</body>
